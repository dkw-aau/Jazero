server {
    listen 80;
    server_name jazero.dk;
    server_tokens off;

    location / {
        resolver 127.0.0.11;
        proxy_pass http://jazero:8080;
    }
}

server {
    listen 80;
    server_name jazero.dk;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}